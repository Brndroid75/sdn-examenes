<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDN Exámenes</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* --- TU CSS ORIGINAL --- */
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300&display=swap');
:root{
  --bg:#080f0a;--surface:#0d1a10;--surface2:#132018;
  --border:rgba(180,150,60,.18);--dorado:#c8a84b;--dorado2:#e8c86b;
  --verde:#1a3a2a;--crema:#f0ead8;--dim:#8a8a7a;
  --correct:#2a7a48;--correct-light:#7dffa5;
  --wrong:#7a1818;--wrong-light:#ffaaaa;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Source Serif 4',Georgia,serif;background:var(--bg);color:var(--crema);min-height:100vh;overflow-x:hidden;}

/* CORRECCIÓN DE NAVEGACIÓN: Asegura que las pantallas se oculten */
.screen {
  display: none !important;
  opacity: 0;
  transition: opacity .28s ease;
}
.screen.active {
  display: flex !important; /* Home usa flex */
  opacity: 1;
}
#exam-screen.active, #stats-screen.active, #study-screen.active {
  display: block !important; /* Pantallas de contenido usan block */
}

/* [EL RESTO DE TU CSS ORIGINAL SE MANTIENE IGUAL] */
/* ... (Se asume el CSS que enviaste) ... */
</style>
</head>
<body>

<!-- PANTALLA 1: CONFIGURACIÓN (LOGIN) -->
<div id="cfg-screen" class="screen active">
  <div class="cfg-box">
    <h2>⚙ Configuración Supabase</h2>
    <div class="cfg-field">
      <label>URL del Proyecto</label>
      <input type="text" id="cfg-url" placeholder="https://xxx.supabase.co">
    </div>
    <div class="cfg-field">
      <label>API Key (Anon)</label>
      <input type="text" id="cfg-key" placeholder="eyJhbGciOiJIUzI1Ni...">
    </div>
    <button class="btn-cfg" onclick="saveConfig()">Conectar e Iniciar</button>
    <div id="cfg-status" class="cfg-status"></div>
  </div>
</div>

<!-- PANTALLA 2: HOME -->
<div id="home-screen" class="screen">
  <div class="logo-hex"><span>SDN</span></div>
  <h1>Examen <span>Integrado</span></h1>
  <div class="stat-row">
     <!-- Tus tarjetas de estadísticas -->
     <div class="stat-card hl"><span class="sv" id="sc-err">0</span><span class="sl">Errores</span></div>
  </div>
  <div class="home-actions">
    <button class="action-btn primary" onclick="showScreen('exam-config-screen')">📝 Examen</button>
    <button class="action-btn study" onclick="showScreen('study-config-screen')">📖 Estudio</button>
    <button class="action-btn" onclick="showStats()">📊 Estadísticas</button>
  </div>
</div>

<!-- PANTALLA 3: CONFIG EXAMEN -->
<div id="exam-config-screen" class="screen">
    <div class="config-inner">
        <h2>Configurar Examen</h2>
        <div class="qty-row">
            <select id="qty-sel"><option value="10">10 preguntas</option><option value="20">20 preguntas</option></select>
        </div>
        <button class="btn-nav primary" onclick="startExam()">INICIAR</button>
        <button class="btn-nav-sm" onclick="showScreen('home-screen')">VOLVER</button>
    </div>
</div>

<!-- PANTALLA 4: EXAMEN (HEADER + CONTENIDO) -->
<header id="exam-header" style="display:none">
    <!-- Tu header de examen -->
</header>
<div id="exam-screen" class="screen">
    <div id="q-text" class="q-text"></div>
    <div id="opts" class="options"></div>
    <div class="nav-row">
        <button class="btn-nav" onclick="goHome()">SALIR</button>
    </div>
</div>

<!-- LOGICA DE SUPABASE Y NAVEGACIÓN -->
<script>
let sb = null;

// FUNCIÓN DE NAVEGACIÓN CORREGIDA
function showScreen(id) {
    // 1. Ocultar todas
    document.querySelectorAll('.screen').forEach(s => {
        s.classList.remove('active');
    });
    
    // 2. Mostrar la solicitada
    const target = document.getElementById(id);
    if(target) {
        target.classList.add('active');
    }

    // 3. Controlar visibilidad de Headers
    document.getElementById('exam-header').style.display = (id === 'exam-screen') ? 'block' : 'none';
}

async function saveConfig() {
    const url = document.getElementById('cfg-url').value;
    const key = document.getElementById('cfg-key').value;
    const status = document.getElementById('cfg-status');

    try {
        sb = supabase.createClient(url, key);
        // Prueba rápida
        const { data, error } = await sb.from('errores').select('*').limit(1);
        if (error) throw error;
        
        status.innerText = "Conexión exitosa";
        showScreen('home-screen');
    } catch (e) {
        status.innerText = "Error de conexión: " + e.message;
    }
}

// Iniciar Examen (Lógica de ejemplo basada en tu BANCO)
const BANCO = [ /* Tu banco de preguntas que pegaste */ ];

function startExam() {
    // Aquí puedes mezclar el BANCO y cargar las preguntas
    showScreen('exam-screen');
    renderQuestion(0);
}

function renderQuestion(index) {
    const q = BANCO[index];
    document.getElementById('q-text').innerText = q.q;
    const optsDiv = document.getElementById('opts');
    optsDiv.innerHTML = q.opts.map((o, i) => 
        `<button class="opt-btn" onclick="check(${i}, ${q.ans})">${o}</button>`
    ).join('');
}

function goHome() {
    showScreen('home-screen');
}
</script>

</body>
</html>
