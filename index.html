<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Evaluación - Capitán Primero</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300&display=swap');
        
        :root {
            --bg: #080f0a; --surface: #0d1a10; --surface2: #132018;
            --border: rgba(180,150,60,.18); --dorado: #c8a84b; --dorado2: #e8c86b;
            --crema: #f0ead8; --dim: #8a8a7a;
            --correct: #2a7a48; --wrong: #7a1818;
        }

        body { font-family: 'Source Serif 4', serif; background: var(--bg); color: var(--crema); margin: 0; }
        .screen { display: none; padding: 20px; max-width: 900px; margin: 0 auto; }
        .screen.active { display: block; }

        /* Estilo para las 6 materias */
        .materias-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin: 30px 0;
        }

        .mat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .mat-card:hover { border-color: var(--dorado); background: var(--surface2); }
        .mat-card.selected { border: 2px solid var(--dorado); background: var(--surface2); }
        
        .mat-card h3 { font-family: 'Oswald'; margin: 0; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; color: var(--dorado); }
        .mat-card p { font-size: 0.75rem; color: var(--dim); margin: 5px 0 0 0; }
        .mat-card .badge { position: absolute; top: 10px; right: 10px; font-size: 0.7rem; background: rgba(200,168,75,0.1); padding: 2px 6px; border-radius: 10px; }

        .btn-primary { 
            background: var(--dorado); color: var(--bg); border: none; padding: 15px 40px; 
            font-family: 'Oswald'; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; width: 100%;
        }
        .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Estilos de Pregunta */
        .q-text { font-size: 1.15rem; padding: 20px; background: var(--surface); border-left: 4px solid var(--dorado); margin: 20px 0; }
        .opt-btn { 
            width: 100%; text-align: left; padding: 15px; margin-bottom: 10px; 
            background: var(--surface2); border: 1px solid var(--border); color: white; cursor: pointer;
        }
        .opt-btn.correct { background: var(--correct); }
        .opt-btn.wrong { background: var(--wrong); }
    </style>
</head>
<body>

<div id="home-screen" class="screen active">
    <h1 style="font-family: 'Oswald'; text-align: center; letter-spacing: 4px;">EVALUACIÓN <span style="color:var(--dorado)">2026</span></h1>
    <p style="text-align: center; color: var(--dim);">Seleccione una de las 6 materias oficiales:</p>

    <div class="materias-grid" id="materias-container">
        </div>

    <button class="btn-primary" id="btn-iniciar" onclick="startExam()" disabled>Iniciar Examen</button>
</div>

<div id="exam-screen" class="screen">
    <div id="exam-header" style="display:flex; justify-content:space-between; font-family:'Oswald'; color:var(--dorado)">
        <span id="progress-text"></span>
        <span id="timer">20:00</span>
    </div>
    <div class="q-text" id="q-text"></div>
    <div id="options-container"></div>
    <div id="feedback" style="margin-top: 20px; font-weight: bold;"></div>
    <button class="btn-primary" id="btn-next" onclick="nextQuestion()" style="margin-top: 20px; display: none;">Siguiente Pregunta</button>
</div>

<script>
    // Configuración de Supabase (Sustituye con tus credenciales si no las has guardado)
    const url = "TU_URL_DE_SUPABASE";
    const key = "TU_ANON_KEY";
    const sb = supabase.createClient(url, key);

    // Lista Oficial de 6 Materias
    const MATERIAS_OFICIALES = [
        { id: 'leg', nombre: 'Legislación Militar' },
        { id: 'ops', nombre: 'Operaciones Militares' },
        { id: 'nor', nombre: 'Normatividad Gubernamental' },
        { id: 'gir', nombre: 'Guerra Irregular' },
        { id: 'adm', nombre: 'Adiestramiento y Mando Militar' },
        { id: 'inf', nombre: 'Táctica de Infantería' }
    ];

    let selectedMateriaId = null;
    let bancoPreguntas = [];
    let currentIndex = 0;

    async function init() {
        const container = document.getElementById('materias-container');
        
        // Consultar conteo real de preguntas en Supabase
        const { data: counts } = await sb.from('materias').select('id, total_preguntas');
        
        container.innerHTML = MATERIAS_OFICIALES.map(m => {
            const dbInfo = counts?.find(c => c.id === m.id);
            const total = dbInfo ? dbInfo.total_preguntas : 0;
            return `
                <div class="mat-card" id="card-${m.id}" onclick="selectMateria('${m.id}')">
                    <span class="badge">${total} pregs</span>
                    <h3>${m.nombre}</h3>
                    <p>${total > 0 ? 'Disponible para evaluación' : 'Sin preguntas cargadas'}</p>
                </div>
            `;
        }).join('');
    }

    function selectMateria(id) {
        selectedMateriaId = id;
        document.querySelectorAll('.mat-card').forEach(c => c.classList.remove('selected'));
        document.getElementById('card-' + id).classList.add('selected');
        document.getElementById('btn-iniciar').disabled = false;
    }

    async function startExam() {
        // Cargar preguntas de la materia seleccionada
        const { data, error } = await sb.from('preguntas')
            .select('*')
            .eq('materia_id', selectedMateriaId)
            .limit(20);

        if (data && data.length > 0) {
            bancoPreguntas = data.sort(() => Math.random() - 0.5);
            currentIndex = 0;
            document.getElementById('home-screen').classList.remove('active');
            document.getElementById('exam-screen').classList.add('active');
            renderQuestion();
        } else {
            alert("Aún no hay preguntas cargadas para esta materia en Supabase.");
        }
    }

    function renderQuestion() {
        const q = bancoPreguntas[currentIndex];
        document.getElementById('progress-text').innerText = `PREGUNTA ${currentIndex + 1} DE ${bancoPreguntas.length}`;
        document.getElementById('q-text').innerText = q.pregunta;
        document.getElementById('feedback').innerText = '';
        document.getElementById('btn-next').style.display = 'none';

        const optsContainer = document.getElementById('options-container');
        optsContainer.innerHTML = '';

        q.opciones.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i, q.respuesta_correcta);
            optsContainer.appendChild(btn);
        });
    }

    async function checkAnswer(selected, correct) {
        const btns = document.querySelectorAll('.opt-btn');
        btns.forEach(b => b.disabled = true);

        if (selected === correct) {
            btns[selected].classList.add('correct');
            document.getElementById('feedback').innerText = "✓ CORRECTO";
            document.getElementById('feedback').style.color = "var(--correct)";
        } else {
            btns[selected].classList.add('wrong');
            btns[correct].classList.add('correct');
            document.getElementById('feedback').innerText = "✗ INCORRECTO";
            document.getElementById('feedback').style.color = "var(--wrong)";
            
            // Guardar error en Supabase para el "Modo Enfoque"
            await sb.from('errores').upsert({
                id: bancoPreguntas[currentIndex].id,
                pregunta_id: bancoPreguntas[currentIndex].id,
                ultima_vez: new Date()
            });
        }
        document.getElementById('btn-next').style.display = 'block';
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < bancoPreguntas.length) {
            renderQuestion();
        } else {
            alert("Examen finalizado. Volviendo al inicio.");
            location.reload();
        }
    }

    init();
</script>

</body>
</html>
