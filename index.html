<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Examen Modular - Promoción a Mayor</title>
<style>
/* 1. DIMENSIONES Y PALETA */
:root {
  --green: #0d3818;
  --green-light: #1a5c2e;
  --green-grad: linear-gradient(135deg, #0d3818 0%, #1a5c2e 100%);
  --wine: #7a1f29;
  --wine-dark: #5a0f17;
  --wine-grad: linear-gradient(90deg, #7a1f29, #5a0f17);
  --gold: #d4af37;
  --cream: #f5f1e6;
  --cream-alt: #f0ead6;
  --gray: #999;
  --red-hard: #c93b3b;
}

body {
  margin: 0; padding: 0; 
  font-family: 'Segoe UI', Tahoma, sans-serif;
  background: var(--green-grad); 
  color: #333; 
  min-height: 100vh;
}

* { box-sizing: border-box; }

.app-container {
  max-width: 960px; 
  margin: 30px auto;
  border-radius: 14px; 
  box-shadow: 0 14px 40px rgba(0,0,0,.35);
  background: var(--cream); 
  overflow: hidden;
  position: relative;
}

header {
  background: var(--wine-grad); 
  border-bottom: 4px solid var(--gold);
  padding: 16px 20px; 
  color: white; 
  text-align: center;
}

header h1 { 
  margin: 0; 
  font-size: 1.4em; 
  letter-spacing: 2px;
  text-transform: uppercase; 
}

/* 2. ARQUITECTURA DE PANTALLAS */
.stats-bar {
  display: grid; 
  grid-template-columns: repeat(4, 1fr);
  background: var(--cream-alt); 
  border-bottom: 3px solid var(--wine);
  text-align: center; 
  padding: 12px 0; 
  position: sticky; 
  top: 0; 
  z-index: 10;
}
.stat-col { font-weight: 600; color: var(--wine); font-size: 0.85em; text-transform: uppercase; }
.stat-val { display: block; color: var(--green); font-size: 1.3em; margin-top: 4px; font-weight: bold; }

.screen { display: none; padding: 28px; }
.screen.active { display: block; animation: fadeIn 0.3s ease-in-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* 3. PANTALLA 1 — MENÚ */
.menu-grid {
  display: grid; 
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); 
  gap: 14px;
}
.card {
  background: white; 
  border: 2px solid #e0e0e0; 
  border-radius: 8px;
  padding: 22px; 
  cursor: pointer; 
  transition: all 0.2s; 
  display: flex;
  flex-direction: column;
}
.card:hover { 
  transform: translateY(-2px); 
  border-color: var(--wine); 
  box-shadow: 0 8px 24px rgba(122,31,41,0.15); 
}
.card h3 { color: var(--wine); margin: 0 0 8px 0; }
.card-desc { color: var(--gray); font-size: 0.9em; margin-bottom: 18px; flex-grow: 1; }
.badge-count { 
  align-self: flex-start;
  background: #f0f0f0; padding: 5px 10px; border-radius: 4px; 
  font-size: 0.8em; font-weight: bold; color: var(--green); 
}

.card-integrado { 
  grid-column: 1 / -1; 
  background: var(--green-grad); 
  border-color: var(--gold); 
  color: white; 
}
.card-integrado h3 { color: var(--gold); }
.card-integrado .card-desc { color: var(--cream-alt); }
.card-integrado .badge-count { background: rgba(255,255,255,0.15); color: var(--gold); }

.progress-bar { 
  background: var(--cream); border-left: 4px solid var(--gold); 
  padding: 10px 14px; margin-bottom: 15px; font-size: 0.85em; 
  border-radius: 4px; display: flex; justify-content: space-between; align-items: center; color: #333; font-weight: 600;
}
.btn-reset { 
  background: transparent; color: var(--wine); border: 1px solid var(--wine); 
  padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8em; transition: 0.2s;
}
.btn-reset:hover { background: var(--wine); color: white; }

/* 4. PANTALLA 2 — CONFIGURACIÓN */
.cfg-block { margin-bottom: 28px; }
.cfg-lbl { font-size: 0.85em; color: var(--gray); display: block; margin-bottom: 10px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px;}
.btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
.btn-opt {
  border: 2px solid var(--green); background: white; color: var(--green);
  padding: 11px 22px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: all 0.2s;
}
.btn-opt:hover:not(:disabled), .btn-opt.selected { background: var(--green); color: white; }
.btn-opt:disabled { opacity: 0.4; cursor: not-allowed; border-color: var(--gray); color: var(--gray); }
.cfg-hint { font-style: italic; font-size: 0.9em; margin-top: 8px; color: #666; }

.btn-primary { background: var(--wine-grad); color: white; border: none; padding: 12px 32px; border-radius: 6px; font-size: 1.1em; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
.btn-primary:hover { box-shadow: 0 4px 15px rgba(122,31,41,0.3); transform: translateY(-1px); }
.btn-sec { background: transparent; color: var(--wine); border: 2px solid var(--wine); padding: 10px 20px; border-radius: 6px; cursor: pointer; margin-left: 10px; font-weight: bold; transition: 0.2s;}
.btn-sec:hover { background: rgba(122,31,41,0.05); }

/* 5. PANTALLA 3 — EXAMEN */
.exam-hdr { background: var(--cream-alt); padding: 12px 18px; border-radius: 6px; margin-bottom: 10px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; font-size: 0.9em; }
.exam-prog { height: 7px; background: #e0e0e0; border-radius: 3px; margin-bottom: 24px; overflow: hidden; }
.exam-prog-fill { height: 100%; background: var(--gold); width: 0%; transition: width 0.3s ease; }
.q-cat { text-transform: uppercase; color: var(--wine); font-size: 0.78em; font-weight: bold; margin-bottom: 8px; letter-spacing: 1px; }
.q-box { border-left: 4px solid var(--wine); padding-left: 18px; font-size: 1.15em; margin-bottom: 24px; font-weight: 600; line-height: 1.4; }

.opts-stack { display: flex; flex-direction: column; gap: 9px; }
.opt-btn {
  border: 2px solid var(--gray); background: white; padding: 13px 16px; border-radius: 8px; text-align: left; cursor: pointer; font-size: 1em; transition: all 0.2s; display: flex; align-items: flex-start; line-height: 1.3;
}
.opt-btn:hover:not(.disabled) { border-color: var(--green); background: #e8f5e9; }
.opt-btn.selected { background: #c8e6c9; border-color: var(--green); }
.opt-btn.correct { background: #d4edda; border-color: var(--green); }
.opt-btn.wrong { background: #f8d7da; border-color: var(--wine); }
.opt-btn.disabled { pointer-events: none; }
.opt-letter { color: var(--wine); font-weight: 700; min-width: 24px; margin-right: 8px; display: inline-block;}

.feedback { margin-top: 18px; font-weight: bold; padding: 12px 16px; border-radius: 6px; display: none; animation: fadeIn 0.2s; }
.feedback.correct { background: #d4edda; color: var(--green); display: block; border-left: 4px solid var(--green); }
.feedback.wrong { background: #f8d7da; color: var(--wine); display: block; border-left: 4px solid var(--wine); }

.exam-actions { margin-top: 28px; display: flex; justify-content: space-between; }
.btn-next { background: var(--green); color: white; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; display: none; transition: 0.2s; }
.btn-next:hover { background: var(--green-light); transform: translateX(2px); }

.badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75em; font-weight: bold; margin-left: 8px; }
.b-of { background: var(--gold); color: var(--green); }
.b-gen { background: var(--gray); color: white; }
.b-dif { background: var(--red-hard); color: white; animation: pulse 2s infinite; }
@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

/* 6. PANTALLA 4 — RESULTADOS */
.score-card { background: var(--green-grad); color: white; text-align: center; padding: 35px 20px; border-radius: 10px; margin-bottom: 30px; box-shadow: inset 0 0 20px rgba(0,0,0,0.2); }
.score-val { color: var(--gold); font-size: 3.2em; font-weight: 800; text-shadow: 0 2px 4px rgba(0,0,0,0.3); margin-bottom: 5px; }
.score-msg { font-size: 1.1em; margin-top: 15px; font-style: italic; color: var(--cream); }

.res-section { margin-bottom: 30px; }
.res-section h4 { border-bottom: 2px solid var(--gold); padding-bottom: 8px; color: var(--wine); margin-bottom: 12px; font-size: 1.1em; text-transform: uppercase; }
.res-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #e0e0e0; font-size: 0.95em; }
.res-good { color: var(--green); font-weight: bold; }
.res-warn { color: #c47f00; font-weight: bold; }
.res-bad { color: var(--wine); font-weight: bold; }

.rev-item { background: white; padding: 18px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #e0e0e0; border-left: 4px solid var(--gray); }
.rev-item.acierto { border-left-color: var(--green); }
.rev-item.fallo { border-left-color: var(--wine); }
.btn-memo { background: transparent; border: 2px solid var(--gray); color: var(--gray); border-radius: 4px; padding: 6px 12px; font-size: 0.85em; font-weight: bold; cursor: pointer; margin-top: 12px; transition: 0.2s; }
.btn-memo.active { background: var(--gold); color: var(--green); border-color: var(--gold); }
.btn-memo:hover:not(.active) { border-color: var(--wine); color: var(--wine); }

@media (max-width: 600px) {
  .menu-grid { grid-template-columns: 1fr; }
  .stats-bar { font-size: 0.8em; padding: 8px 0; }
  .screen { padding: 20px 15px; }
}
</style>
</head>
<body>

<div class="app-container">
  <header>
    <h1>Examen Modular</h1>
  </header>
  <div class="stats-bar">
    <div class="stat-col">Preguntas<span class="stat-val" id="sb-tot">0/0</span></div>
    <div class="stat-col">Actual<span class="stat-val" id="sb-act">-</span></div>
    <div class="stat-col">Aciertos<span class="stat-val" id="sb-aci">0</span></div>
    <div class="stat-col">Tiempo<span class="stat-val" id="sb-tim">00:00</span></div>
  </div>

  <div id="screen-menu" class="screen active">
    <div class="menu-grid" id="menu-container"></div>
  </div>

  <div id="screen-setup" class="screen">
    <h2 style="color: var(--wine); margin-top:0; border-bottom: 2px solid var(--gold); padding-bottom: 10px;">Configuración del Examen</h2>
    
    <div class="cfg-block">
      <span class="cfg-lbl">Modo de Práctica</span>
      <div class="btn-group" id="cfg-mode">
        <button class="btn-opt selected" data-val="random">Aleatorio</button>
        <button class="btn-opt" data-val="adapt">Adaptativo (70/30)</button>
        <button class="btn-opt" data-val="wrong">Sólo Errores (<span id="cfg-err-count">0</span>)</button>
      </div>
      <div class="cfg-hint" id="cfg-mode-hint">Preguntas de todo el banco seleccionadas al azar.</div>
    </div>

    <div class="cfg-block">
      <span class="cfg-lbl">Origen de las Preguntas</span>
      <div class="btn-group" id="cfg-src">
        <button class="btn-opt selected" data-val="all">Todas</button>
        <button class="btn-opt" data-val="of">Sólo Oficiales</button>
        <button class="btn-opt" data-val="gen">Sólo Generadas</button>
      </div>
    </div>

    <div class="cfg-block">
      <span class="cfg-lbl">Cantidad</span>
      <div class="btn-group" id="cfg-qty">
        <button class="btn-opt" data-val="10">10</button>
        <button class="btn-opt selected" data-val="20">20</button>
        <button class="btn-opt" data-val="30">30</button>
        <button class="btn-opt" data-val="50">50</button>
        <button class="btn-opt" data-val="all">Todas</button>
      </div>
    </div>

    <div style="margin-top: 30px;">
      <button class="btn-primary" onclick="startExam()">Comenzar examen</button>
      <button class="btn-sec" onclick="showScreen('menu')">← Volver al menú</button>
    </div>
  </div>

  <div id="screen-exam" class="screen">
    <div class="exam-hdr">
      <span id="ex-progress-text">Pregunta 1 de N</span>
      <div>
        <span id="ex-cat" style="margin-right:10px; text-transform:uppercase; color:var(--wine);">CATEGORÍA</span>
        <span id="ex-badges"></span>
      </div>
    </div>
    <div class="exam-prog"><div class="exam-prog-fill" id="ex-prog-bar"></div></div>
    
    <div class="q-cat" id="ex-cat-sub"></div>
    <div class="q-box" id="ex-q-text"></div>

    <div class="opts-stack" id="ex-opts"></div>

    <div class="feedback" id="ex-feedback"></div>

    <div class="exam-actions">
      <button class="btn-sec" style="margin-left:0;" onclick="confirmAbandon()">Abandonar</button>
      <button class="btn-next" id="btn-next" onclick="nextQuestion()">Siguiente →</button>
    </div>
  </div>

  <div id="screen-results" class="screen">
    <div class="score-card">
      <div class="score-val" id="res-score">0 / 0</div>
      <div style="font-size: 1.5em; font-weight: bold;" id="res-perc">0%</div>
      <div class="score-msg" id="res-msg"></div>
    </div>

    <div class="res-section" id="res-src-sec">
      <h4>Desempeño por Origen</h4>
      <div id="res-src-list"></div>
    </div>

    <div class="res-section">
      <h4>Desempeño por Categoría</h4>
      <div id="res-cat-list"></div>
    </div>

    <div class="res-section">
      <h4>Revisión Pregunta por Pregunta</h4>
      <div id="res-rev-list"></div>
    </div>

    <div style="display:flex; gap: 12px; flex-wrap: wrap; margin-top: 30px;">
      <button class="btn-sec" style="margin-left:0;" onclick="showScreen('menu')">← Menú principal</button>
      <button class="btn-sec" style="margin-left:0;" id="btn-prac-err" onclick="practiceErrors()">Practicar sólo errores</button>
      <button class="btn-primary" style="margin-top:0;" onclick="repeatExam()">Repetir este examen</button>
    </div>
  </div>
</div>

<script>
// 8. ESTRUCTURA DE DATOS DEL BANCO
const MATERIAS = [
  { id: 'leg', name: 'Legislación Militar' },
  { id: 'ops', name: 'Operaciones Militares' },
  { id: 'nor', name: 'Normatividad Gubernamental' },
  { id: 'gir', name: 'Guerra Irregular' },
  { id: 'adm', name: 'Adiestramiento y Mando Militar' },
  { id: 'tac', name: 'Táctica de Infantería' }
];

const BANCO = {
  leg: [
    {id:'L001', c:'Generalidades', q:'[Espacio reservado para banco de Legislación Militar]', o:['Opción A','Opción B','Opción C','Opción D'], a:0, src:'of'}
  ],
  ops: [
    {id:'O057', c:'Táctica', q:'Consiste en aprovechar al máximo el terreno en combinación con las tropas dispuestas en profundidad, a fin de que el adversario que progresa encuentre resistencias y obstáculos que le impida su avance.', o:['Retardo Mediante Acción Ofensiva.','Retardo en Posiciones Alternas.','Retardo en Posiciones Sucesivas.','Retardo en Posiciones Principales.'], a:0, src:'of'},
    {id:'O068', c:'Maniobra', q:'A las unidades de maniobra con unidades de artillería se les asocia para:', o:['Envolvimiento de gran radio de acción.','Envolvimiento de corto radio de acción.','Envolvimiento Múltiple.','Movimiento de Rodeo.'], a:0, src:'of'},
    {id:'O080', c:'Retardo', q:'Es la acción para que el grueso de la unidad se aleje del enemigo, sin que éste ejerza presión directa sobre él o con el fin de...', o:['Romper el contacto.','Iniciar un ataque.','Evitar la sorpresa.','Acelerar la marcha.'], a:0, src:'gen'},
    {id:'M010', c:'Maniobra', q:'Concierne al empleo y operación de las tropas de combate, puede ser ofensiva, defensiva y en retirada.', o:['Maniobra Táctica.','Maniobra Estratégica.','Maniobra Ofensiva.','Maniobra Terrestre.'], a:0, src:'of'},
    {id:'M064', c:'Clasificación', q:'¿Cómo se clasifica la maniobra?', o:['Naturaleza y alcance; por las fuerzas que participan en ella; y por el tipo de Operación a desarrollar.','Naturaleza y propósito; por las fuerzas que intervienen y ámbito en el que se desarrolla.','Por el terreno y el enemigo.','Terrestre, Aérea y Naval.'], a:0, src:'of'}
  ],
  nor: [
    {id:'N001', c:'Generalidades', q:'[Espacio reservado para banco de Normatividad]', o:['Opción A','Opción B','Opción C','Opción D'], a:0, src:'gen'}
  ],
  gir: [
    {id:'G001', c:'Generalidades', q:'[Espacio reservado para banco de Guerra Irregular]', o:['Opción A','Opción B','Opción C','Opción D'], a:0, src:'of'}
  ],
  adm: [
    {id:'A001', c:'Generalidades', q:'[Espacio reservado para banco de Adiestramiento y Mando]', o:['Opción A','Opción B','Opción C','Opción D'], a:0, src:'of'}
  ],
  tac: [
    {id:'T001', c:'Generalidades', q:'[Espacio reservado para banco de Táctica de Infantería]', o:['Opción A','Opción B','Opción C','Opción D'], a:0, src:'of'}
  ]
};

// ESTADO GLOBAL
let state = {
  mat: null, mode: 'random', src: 'all', qty: 20, pool: [], qIdx: 0,
  score: 0, time: 0, timer: null, errs: {}, mems: [], answers: [],
  shuffledOpts: [], correctIdx: 0
};

// 7. SISTEMA DE APRENDIZAJE PERSISTENTE
function getStorageKey(matId) {
  return matId === 'all' ? 'integrado_v1' : `${matId}_v1`;
}

function loadProgress(matId) {
  const data = localStorage.getItem(getStorageKey(matId));
  if(data) {
    try { return JSON.parse(data); } catch(e){}
  }
  return { errores: {}, memorizadas: [] };
}

function saveProgress() {
  localStorage.setItem(getStorageKey(state.mat), JSON.stringify({
    errores: state.errs, memorizadas: state.mems
  }));
}

// INICIALIZACIÓN
function init() { renderMenu(); }

function renderMenu() {
  const container = document.getElementById('menu-container');
  container.innerHTML = '';

  MATERIAS.forEach(m => {
    const p = loadProgress(m.id);
    const errCount = Object.values(p.errores).filter(v=>v>0).length;
    const memCount = p.memorizadas.length;
    const qty = BANCO[m.id].length;
    
    let progHtml = '';
    if (errCount > 0 || memCount > 0) {
      progHtml = `<div class="progress-bar">
        <span>⚠ ${errCount} errores · ✓ ${memCount} memorizadas</span>
        <button class="btn-reset" onclick="resetProgress('${m.id}', event)">Reiniciar</button>
      </div>`;
    }

    container.innerHTML += `
      <div class="card" onclick="openSetup('${m.id}')">
        ${progHtml}
        <h3>${m.name}</h3>
        <div class="card-desc">Banco específico de la materia.</div>
        <span class="badge-count">${qty} preguntas</span>
      </div>
    `;
  });

  const totalQty = Object.values(BANCO).reduce((acc, val) => acc + val.length, 0);
  let intProgHtml = '';
  const intP = loadProgress('all');
  const ieC = Object.values(intP.errores).filter(v=>v>0).length;
  if (ieC > 0 || intP.memorizadas.length > 0) {
    intProgHtml = `<div class="progress-bar">
      <span>⚠ ${ieC} errores · ✓ ${intP.memorizadas.length} memorizadas</span>
      <button class="btn-reset" onclick="resetProgress('all', event)" style="color:var(--gold); border-color:var(--gold);">Reiniciar</button>
    </div>`;
  }

  container.innerHTML += `
    <div class="card card-integrado" onclick="openSetup('all')">
      ${intProgHtml}
      <h3>INTEGRADO</h3>
      <div class="card-desc">Simulador global combinando todas las materias del temario.</div>
      <span class="badge-count">${totalQty} preguntas totales</span>
    </div>
  `;
}

function resetProgress(matId, e) {
  e.stopPropagation();
  if(confirm("¿Seguro que desea reiniciar el progreso de este banco?")) {
    localStorage.removeItem(getStorageKey(matId));
    renderMenu();
  }
}

function openSetup(matId) {
  state.mat = matId;
  const p = loadProgress(matId);
  state.errs = p.errores || {};
  state.mems = p.memorizadas || [];

  const errCount = Object.keys(state.errs).filter(k => state.errs[k]>0 && !state.mems.includes(k)).length;
  document.getElementById('cfg-err-count').textContent = errCount;

  const btnsMode = document.querySelectorAll('#cfg-mode .btn-opt');
  btnsMode.forEach(b => {
    b.classList.remove('selected');
    b.disabled = (b.dataset.val !== 'random' && errCount === 0);
  });
  btnsMode[0].classList.add('selected');
  state.mode = 'random';
  updateModeHint();

  document.querySelectorAll('#cfg-src .btn-opt').forEach(b => b.classList.remove('selected'));
  document.querySelector('#cfg-src .btn-opt[data-val="all"]').classList.add('selected');
  state.src = 'all';

  document.querySelectorAll('#cfg-qty .btn-opt').forEach(b => b.classList.remove('selected'));
  document.querySelector('#cfg-qty .btn-opt[data-val="20"]').classList.add('selected');
  state.qty = 20;

  // Ajustar cantidades disponibles
  const rawQty = getFullPool().length;
  document.querySelectorAll('#cfg-qty .btn-opt').forEach(b => {
    if(b.dataset.val !== 'all' && parseInt(b.dataset.val) > rawQty) b.style.display = 'none';
    else b.style.display = 'inline-block';
  });

  showScreen('setup');
}

document.getElementById('cfg-mode').addEventListener('click', e => {
  if (e.target.classList.contains('btn-opt') && !e.target.disabled) {
    document.querySelectorAll('#cfg-mode .btn-opt').forEach(b=>b.classList.remove('selected'));
    e.target.classList.add('selected');
    state.mode = e.target.dataset.val;
    updateModeHint();
  }
});
document.getElementById('cfg-src').addEventListener('click', e => {
  if (e.target.classList.contains('btn-opt') && !e.target.disabled) {
    document.querySelectorAll('#cfg-src .btn-opt').forEach(b=>b.classList.remove('selected'));
    e.target.classList.add('selected');
    state.src = e.target.dataset.val;
  }
});
document.getElementById('cfg-qty').addEventListener('click', e => {
  if (e.target.classList.contains('btn-opt') && !e.target.disabled) {
    document.querySelectorAll('#cfg-qty .btn-opt').forEach(b=>b.classList.remove('selected'));
    e.target.classList.add('selected');
    state.qty = e.target.dataset.val === 'all' ? 'all' : parseInt(e.target.dataset.val);
  }
});

function updateModeHint() {
  const hints = {
    random: "Preguntas de todo el banco seleccionadas al azar.",
    adapt: "70% preguntas falladas anteriormente, 30% preguntas nuevas o acertadas.",
    wrong: "Únicamente las que tienen errores registrados en el historial."
  };
  document.getElementById('cfg-mode-hint').textContent = hints[state.mode];
}

function getFullPool() {
  if (state.mat === 'all') {
    let pool = [];
    MATERIAS.forEach(m => { BANCO[m.id].forEach(q => { pool.push({...q, matName: m.name}); }); });
    return pool;
  }
  return [...BANCO[state.mat]];
}

function shuffle(array) {
  let currentIndex = array.length, randomIndex;
  while (currentIndex !== 0) {
    randomIndex = Math.floor(Math.random() * currentIndex);
    currentIndex--;
    [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
  }
  return array;
}

// 9. COMPORTAMIENTO GENERAL
function startExam() {
  let rawPool = getFullPool();
  if (state.src !== 'all') rawPool = rawPool.filter(q => q.src === state.src);

  const conError = rawPool.filter(q => state.errs[q.id] > 0 && !state.mems.includes(q.id))
                          .sort((a,b) => state.errs[b.id] - state.errs[a.id]);
  const sinError = rawPool.filter(q => !state.errs[q.id] || state.mems.includes(q.id));

  let finalPool = [];
  const reqQty = state.qty === 'all' ? rawPool.length : state.qty;

  if (state.mode === 'wrong') {
    finalPool = shuffle(conError).slice(0, reqQty);
  } else if (state.mode === 'adapt') {
    const wantWrong = Math.min(Math.ceil(reqQty * 0.7), conError.length);
    const wantOther = Math.min(reqQty - wantWrong, sinError.length);
    finalPool = shuffle([...conError.slice(0, wantWrong), ...shuffle(sinError).slice(0, wantOther)]);
  } else {
    finalPool = shuffle(rawPool).slice(0, reqQty);
  }

  if (finalPool.length === 0) return alert("No hay suficientes preguntas con los filtros seleccionados.");

  state.pool = finalPool;
  state.qIdx = 0; state.score = 0; state.answers = []; state.time = 0;
  
  document.getElementById('sb-tot').textContent = `0/${state.pool.length}`;
  document.getElementById('sb-act').textContent = '1';
  document.getElementById('sb-aci').textContent = '0';
  document.getElementById('sb-tim').textContent = '00:00';
  
  clearInterval(state.timer);
  state.timer = setInterval(() => {
    state.time++;
    const m = String(Math.floor(state.time / 60)).padStart(2, '0');
    const s = String(state.time % 60).padStart(2, '0');
    document.getElementById('sb-tim').textContent = `${m}:${s}`;
  }, 1000);

  showScreen('exam');
  renderQuestion();
}

function renderQuestion() {
  const q = state.pool[state.qIdx];
  const total = state.pool.length;
  
  document.getElementById('sb-tot').textContent = `${state.qIdx}/${total}`;
  document.getElementById('sb-act').textContent = state.qIdx + 1;
  document.getElementById('ex-progress-text').textContent = `Pregunta ${state.qIdx + 1} de ${total}`;
  document.getElementById('ex-prog-bar').style.width = `${(state.qIdx / total) * 100}%`;
  
  let catText = q.c;
  if(q.matName) catText = `${q.matName} · ${catText}`;
  document.getElementById('ex-cat').textContent = catText;
  document.getElementById('ex-cat-sub').textContent = catText;
  document.getElementById('ex-q-text').textContent = q.q;

  let badgesHtml = '';
  if(q.src === 'of') badgesHtml += `<span class="badge b-of">OFICIAL</span>`;
  if(q.src === 'gen') badgesHtml += `<span class="badge b-gen">GEN.</span>`;
  if(state.errs[q.id] >= 2 && !state.mems.includes(q.id)) badgesHtml += `<span class="badge b-dif">⚠ DIFÍCIL</span>`;
  document.getElementById('ex-badges').innerHTML = badgesHtml;

  const optsWithIdx = q.o.map((text, i) => ({ text, isCorrect: i === q.a }));
  state.shuffledOpts = shuffle(optsWithIdx);
  state.correctIdx = state.shuffledOpts.findIndex(o => o.isCorrect);

  const letters = ['A', 'B', 'C', 'D'];
  document.getElementById('ex-opts').innerHTML = state.shuffledOpts.map((o, i) => `
    <div class="opt-btn" onclick="selectOption(${i})">
      <span class="opt-letter">${letters[i]}.</span> ${o.text}
    </div>
  `).join('');

  document.getElementById('ex-feedback').style.display = 'none';
  document.getElementById('btn-next').style.display = 'none';
  document.getElementById('btn-next').textContent = state.qIdx === total - 1 ? 'Ver resultados →' : 'Siguiente →';
}

function selectOption(idx) {
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach(b => b.classList.add('disabled'));

  const isCorrect = (idx === state.correctIdx);
  const q = state.pool[state.qIdx];
  
  state.answers.push({ q, ansIdx: idx, correct: isCorrect, correctLetter: ['A','B','C','D'][state.correctIdx] });

  if (isCorrect) {
    btns[idx].classList.add('correct');
    state.score++;
    document.getElementById('sb-aci').textContent = state.score;
    if (state.errs[q.id]) {
      state.errs[q.id]--;
      if (state.errs[q.id] <= 0) delete state.errs[q.id];
    }
  } else {
    btns[idx].classList.add('wrong');
    btns[state.correctIdx].classList.add('correct');
    if (!state.mems.includes(q.id)) state.errs[q.id] = (state.errs[q.id] || 0) + 1;
  }
  saveProgress();

  const fb = document.getElementById('ex-feedback');
  fb.className = `feedback ${isCorrect ? 'correct' : 'wrong'}`;
  fb.innerHTML = isCorrect ? `✓ ¡Correcto!` : `✗ Incorrecto. La respuesta correcta era la <b>${state.answers[state.qIdx].correctLetter}</b>.`;
  fb.style.display = 'block';

  document.getElementById('btn-next').style.display = 'block';
}

function nextQuestion() {
  state.qIdx++;
  if (state.qIdx < state.pool.length) renderQuestion();
  else finishExam();
}

function confirmAbandon() {
  if(confirm("¿Seguro que desea abandonar el examen en curso? El progreso actual se perderá.")) {
    clearInterval(state.timer);
    showScreen('menu');
  }
}

function finishExam() {
  clearInterval(state.timer);
  const total = state.pool.length;
  const perc = Math.round((state.score / total) * 100);
  
  document.getElementById('sb-tot').textContent = `${total}/${total}`;
  document.getElementById('sb-act').textContent = '-';
  document.getElementById('res-score').textContent = `${state.score} / ${total}`;
  document.getElementById('res-perc').textContent = `${perc}%`;

  let msg = '';
  if(perc>=90) msg="Excelente. Dominio sólido de la materia.";
  else if(perc>=80) msg="Muy bien. Conocimiento firme; afine detalles.";
  else if(perc>=70) msg="Bien. Refuerce las categorías con menor desempeño.";
  else if(perc>=60) msg="Regular. Es necesario un repaso enfocado.";
  else msg="Insuficiente. Requiere repaso integral del temario.";
  document.getElementById('res-msg').textContent = msg;

  // Desempeño por Origen
  const srcs = { of: {t:0,c:0, n:'Oficiales'}, gen: {t:0,c:0, n:'Generadas'} };
  state.answers.forEach(a => {
    if(a.q.src && srcs[a.q.src]) {
      srcs[a.q.src].t++;
      if(a.correct) srcs[a.q.src].c++;
    }
  });
  
  let srcHtml = '';
  Object.keys(srcs).forEach(k => {
    if(srcs[k].t > 0) {
      const p = Math.round((srcs[k].c / srcs[k].t)*100);
      let cClass = p>=80 ? 'res-good' : (p>=60 ? 'res-warn' : 'res-bad');
      let badge = k==='of' ? '<span class="badge b-of" style="margin:0 10px 0 0;">OFICIAL</span>' : '<span class="badge b-gen" style="margin:0 10px 0 0;">GEN.</span>';
      srcHtml += `<div class="res-row"><span>${badge} ${srcs[k].n}</span> <span class="${cClass}">${srcs[k].c}/${srcs[k].t} (${p}%)</span></div>`;
    }
  });
  document.getElementById('res-src-list').innerHTML = srcHtml;
  document.getElementById('res-src-sec').style.display = srcHtml ? 'block' : 'none';

  // Desempeño por Categoría
  const cats = {};
  state.answers.forEach(a => {
    let catKey = a.q.c;
    if(a.q.matName) catKey = `${a.q.matName} · ${catKey}`;
    if(!cats[catKey]) cats[catKey] = { t:0, c:0 };
    cats[catKey].t++;
    if(a.correct) cats[catKey].c++;
  });
  
  document.getElementById('res-cat-list').innerHTML = Object.keys(cats).map(k => {
    const p = Math.round((cats[k].c / cats[k].t)*100);
    let cClass = p>=80 ? 'res-good' : (p>=60 ? 'res-warn' : 'res-bad');
    return `<div class="res-row"><span>${k}</span> <span class="${cClass}">${cats[k].c}/${cats[k].t} (${p}%)</span></div>`;
  }).join('');

  // Revisión pregunta por pregunta
  document.getElementById('res-rev-list').innerHTML = state.answers.map((a, i) => {
    const isErrHist = state.errs[a.q.id] > 0;
    const canMemo = !a.correct || isErrHist;
    const isMemo = state.mems.includes(a.q.id);

    let badgesHtml = '';
    if(a.q.src === 'of') badgesHtml += `<span class="badge b-of">OFICIAL</span>`;
    if(a.q.src === 'gen') badgesHtml += `<span class="badge b-gen">GEN.</span>`;
    if(isErrHist && !isMemo && state.errs[a.q.id] >= 2) badgesHtml += `<span class="badge b-dif">⚠ DIFÍCIL</span>`;
    
    let ansLetter = ['A','B','C','D'][a.ansIdx];

    return `
      <div class="rev-item ${a.correct ? 'acierto' : 'fallo'}">
        <div style="margin-bottom:12px; display:flex; align-items:center;">
          <span style="font-size:0.85em; color:var(--gray); text-transform:uppercase; font-weight:bold; letter-spacing:1px; margin-right:8px;">${a.q.matName ? a.q.matName+' · ' : ''}${a.q.c}</span>
          ${badgesHtml}
        </div>
        <div style="font-weight:600; font-size:1.05em; margin-bottom:12px;">${i+1}. ${a.q.q}</div>
        <div style="color:${a.correct ? 'var(--green)' : 'var(--wine)'}; font-weight:600; margin-bottom: 5px;">
          ${a.correct ? `✓ Su respuesta: ${ansLetter}. (Correcta)` : `✗ Su respuesta: ${ansLetter}.`}
        </div>
        ${!a.correct ? `<div style="color:var(--green); font-weight:600;">Correcta: ${a.correctLetter}. ${a.q.o[a.q.a]}</div>` : ''}
        ${canMemo ? `<button class="btn-memo ${isMemo?'active':''}" onclick="toggleMemo('${a.q.id}', this)">${isMemo ? '✓ Memorizada' : 'Marcar como memorizada'}</button>` : ''}
      </div>
    `;
  }).join('');

  document.getElementById('btn-prac-err').style.display = Object.keys(state.errs).length > 0 ? 'inline-block' : 'none';
  showScreen('results');
}

function toggleMemo(id, btn) {
  const idx = state.mems.indexOf(id);
  if(idx > -1) {
    state.mems.splice(idx, 1);
    btn.classList.remove('active');
    btn.textContent = 'Marcar como memorizada';
  } else {
    state.mems.push(id);
    delete state.errs[id];
    btn.classList.add('active');
    btn.textContent = '✓ Memorizada';
  }
  saveProgress();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${id}`).classList.add('active');
  if(id === 'menu') {
    document.getElementById('sb-tot').textContent = '0/0';
    document.getElementById('sb-act').textContent = '-';
    document.getElementById('sb-aci').textContent = '0';
    document.getElementById('sb-tim').textContent = '00:00';
    renderMenu();
  }
}

function practiceErrors() { state.mode = 'wrong'; startExam(); }
function repeatExam() { state.qIdx = 0; state.score = 0; state.answers = []; state.time = 0; showScreen('exam'); renderQuestion(); }

window.onload = init;
</script>
